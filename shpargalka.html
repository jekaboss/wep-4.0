<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEP-3.0 - Шпаргалка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    h1 { margin-bottom: 20px; font-size: 2rem; }
    .spinner {
      width: 60px;
      height: 60px;
      margin: 30px auto;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      margin: 20px 0;
      font-size: 1.1rem;
    }
    .btn {
      padding: 15px 30px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin: 10px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .success {
      background: #44aa44;
      color: white;
    }
    .error {
      background: #ff4444;
      color: white;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Шпаргалка</h1>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Перевірка сервера...</div>
    <div id="buttons" class="hidden">
      <button class="btn" id="startBtn" onclick="startServer()">🚀 Запустити сервер</button>
      <button class="btn" onclick="openCheatsheet()">📖 Відкрити шпаргалку</button>
    </div>
    <div id="redirectMsg" class="hidden">
      <p>Зачекайте... Відкриваємо шпаргалку</p>
    </div>
  </div>

  <script>
    const API_URL = (window.location.protocol.startsWith('http') ? window.location.origin : 'http://localhost:3000') + '/api';
    const SERVER_BAT = 'start-server.bat';

    // Check if server is running
    function checkServer() {
      return fetch(API_URL + '/cheatsheets', {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
      })
      .then(response => {
        if (response.ok) {
          return true;
        }
        return false;
      })
      .catch(() => false);
    }

    // Open cheatsheet page
    function openCheatsheet() {
      window.location.href = 'cheatsheet.html';
    }

    // Start server using universal method
    function startServer() {
      var btn = document.getElementById('startBtn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Запуск...';
      }

      // Check if running in Electron
      if (window.electronAPI) {
        window.electronAPI.startServer().then(() => {
          console.log('Сервер запущено через Electron!');
        });
      } else {
        // Try custom protocol first
        window.location.href = 'wep://start';
      }
    }

    // Initialize - auto-start server and redirect
    checkServer().then(function(running) {
      if (running) {
        // Server already running - redirect immediately
        document.getElementById('status').textContent = 'Сервер працює! Відкриваємо шпаргалку...';
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('redirectMsg').classList.remove('hidden');
        setTimeout(openCheatsheet, 1000);
      } else {
        // Server not running - start it automatically
        document.getElementById('status').textContent = 'Запуск сервера...';
        startServer();
        
        // Wait for server to start then redirect
        setTimeout(function check() {
          checkServer().then(function(running) {
            if (running) {
              document.getElementById('status').textContent = 'Сервер запущено! Відкриваємо шпаргалку...';
              document.getElementById('spinner').style.display = 'none';
              document.getElementById('redirectMsg').classList.remove('hidden');
              setTimeout(openCheatsheet, 1500);
            } else {
              // Server didn't start - show buttons for manual action
              document.getElementById('spinner').style.display = 'none';
              document.getElementById('status').textContent = 'Сервер не запустився автоматично';
              document.getElementById('buttons').classList.remove('hidden');
            }
          });
        }, 5000);
      }
    });
  </script>
</body>
</html>

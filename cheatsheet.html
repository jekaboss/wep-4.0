<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./assets/img/favicon.ico">
  <title>WEP-Блокнот - Шпаргалка</title>
  <link rel="stylesheet" href="./css/tabs.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="./css/wp.css">
  <style>
    .cheatsheet-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .cheatsheet-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; width: 100%; padding: 12px 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; color: white; }
    .cheatsheet-header h1 { margin: 0; color: #ffe03c; font-size: 2rem; flex: 1 1 auto; min-width: 220px; }
    .cheatsheet-header__controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; width: auto; }
    .cheatsheet-search { display: flex; align-items: center; position: relative; }
    .cheatsheet-search input { width: 0; opacity: 0; padding: 0 10px; height: 40px; border: 2px solid #ddd; border-radius: 5px; transition: width .25s ease, opacity .25s ease, padding .25s ease; background: white; color: #333; font-size: 0.95rem; outline: none; }
    .cheatsheet-search.active input { width: 220px; opacity: 1; padding: 8px 10px; }
    .cheatsheet-search button { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: none; border-radius: 5px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-size: 1.05rem; }
    .cheatsheet-search.active button { background: #fff; color: #667eea; }
    .add-btn { padding: 12px 24px; background: #fff; color: #667eea; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; white-space: nowrap; }
    .add-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    @media (max-width: 900px) {
      .cheatsheet-header { justify-content: flex-start; }
      .cheatsheet-header h1 { font-size: 1.7rem; }
      .cheatsheet-header__controls { width: 100%; justify-content: flex-start; }
      .cheatsheet-header__controls input { width: 100%; max-width: 360px; }
    }
    @media (max-width: 600px) {
      .cheatsheet-header { padding: 10px 12px; }
      .cheatsheet-header h1 { width: 100%; font-size: 1.5rem; }
      .cheatsheet-header__controls { gap: 8px; }
      .cheatsheet-header__controls input { width: 100%; }
      .cheatsheet-header__controls span, .cheatsheet-header__controls button { width: 100%; }
      .cheatsheet-header__controls { flex-direction: column; align-items: stretch; }
      .add-btn { width: 100%; }
    }
    .add-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .cheatsheet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .cheatsheet-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .cheatsheet-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
    .cheatsheet-card__header { padding: 15px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; justify-content: space-between; align-items: center; }
    .cheatsheet-card__title { margin: 0; font-size: 1.2rem; font-weight: bold; }
    .cheatsheet-card__actions { display: flex; gap: 10px; }
    .cheatsheet-card__action-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    .cheatsheet-card__action-btn.delete { background: rgba(234,32,32,0.7); }
    .cheatsheet-card__body { padding: 20px; max-height: 500px; overflow-y: auto; }
    .code-display { margin-bottom: 15px; padding: 15px; background: #1e1e1e; border-radius: 5px; border-left: 4px solid #667eea; overflow-x: auto; }
    .code-type-label { display: inline-block; padding: 4px 10px; border-radius: 3px; font-size: 0.75rem; font-weight: bold; color: white; margin-bottom: 10px; }
    .code-type-label--html { background: #e44d26; }
    .code-type-label--css { background: #264de4; }
    .code-type-label--js { background: #f7df1e; color: #333; }
    .code-display pre { margin: 0; }
    .code-display code { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.85rem; white-space: pre; color: #d4d4d4; }
    
    /* Syntax highlighting */
    .code-tag { color: #569cd6; }
    .code-attr { color: #9cdcfe; }
    .code-string { color: #ce9178; }
    .code-comment { color: #6a9955; }
    .code-keyword { color: #c586c0; }
    .code-function { color: #dcdcaa; }
    .code-number { color: #b5cea8; }
    .code-selector { color: #d7ba7d; }
    .code-property { color: #9cdcfe; }
    .cheatsheet-card__description { margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; color: #666; font-size: 0.9rem; }
    .type-badge { padding: 4px 10px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; color: white; }
    .type-badge--html { background: #e44d26; }
    .type-badge--css { background: #264de4; }
    .type-badge--js { background: #f7df1e; color: #333; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
    .modal.active { display: flex; justify-content: center; align-items: center; }
    .modal-content { background: #1e1e1e; border-radius: 10px; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; color: #d4d4d4; }
    .modal-header { padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; justify-content: space-between; align-items: center; border-radius: 10px 10px 0 0; }
    .modal-header h2 { margin: 0; }
    .modal-close { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.5rem; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
    .modal-body { padding: 25px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #d4d4d4; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #3c3c3c; border-radius: 5px; font-size: 1rem; box-sizing: border-box; background: #2d2d2d; color: #d4d4d4; }
    .form-group textarea { min-height: 500px; font-family: 'Consolas', 'Monaco', monospace; resize: vertical; }
    .form-actions { display: flex; gap: 15px; justify-content: flex-end; }
    .btn { padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn--primary { background: #667eea; color: white; }
    .btn--secondary { background: #3c3c3c; color: #d4d4d4; }
    .btn--preview { width: 100%; background: #11998e; color: white; margin-top: 15px; margin-bottom: 15px; }
    .btn--copy { background: #3c3c3c; color: #d4d4d4; padding: 8px 12px; font-size: 0.85rem; margin-top: 5px; }
    .btn--copy:hover { background: #667eea; color: white; }
    .code-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .preview-container { display: none; border: 2px solid #3c3c3c; border-radius: 5px; overflow: hidden; }
    .preview-container.active { display: block; }
    #previewFrame { width: 100%; height: 300px; border: none; background: #1e1e1e; }
    .tabs-filter { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tabs-filter button { padding: 8px 16px; background: #757070; border: 2px solid #ddd; border-radius: 20px; cursor: pointer; }
    .tabs-filter button.active { background: #667eea; color: white; border-color: #667eea; }
    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="header">
      <div class="header__container">
        <div class="header__body">
          <a href="index.html"><img class="header__logo" alt="logo" src="./assets/img/logo1.webp"></a>
          <!-- <nav class="menu">
            <ul class="menu__list">
              <li><a href="html.html" class="menu__link">html</a></li>
              <li><a href="css.html" class="menu__link">css</a></li>
              <li><a href="scss.html" class="menu__link">scss</a></li>
              <li><a href="js.html" class="menu__link">JavaScript</a></li>
              <li><a href="git.html" class="menu__link">GIT</a></li>
            </ul>
          </nav> -->
					<div class="cheatsheet-header">
          <h1>Шпаргалка</h1>
          <div class="cheatsheet-header__controls">
            <span id="serverStatus" style="padding:8px 12px;background:#ff4444;color:white;border-radius:5px;font-size:0.85rem;">🔴 Сервер вимкнено</span>
            <div class="cheatsheet-search" id="searchWrapper">
              <button type="button" id="searchToggle" aria-label="Пошук">🔍</button>
              <input type="text" id="searchInput" placeholder="Пошук...">
            </div>
            <!-- <button class="add-btn" id="exportBtn" title="Експортувати">📤 Експорт</button>
            <button class="add-btn" id="importBtn" title="Імпортувати">📥 Імпорт</button>
            <input type="file" id="importFile" style="display:none;" accept=".json"> -->
            <button class="add-btn" id="openModal">+ Додати</button>
          </div>
        </div>
        </div>
      </div>
    </header>
    <main class="page">
      <div class="cheatsheet-container">
        
        <!-- <div class="tabs-filter">
          <button class="active" data-filter="all">Всі</button>
          <button data-filter="html">HTML</button>
          <button data-filter="css">CSS</button>
          <button data-filter="js">JS</button>
        </div> -->
        <div class="cheatsheet-grid" id="cheatsheetGrid"></div>
        <div class="empty-state" id="emptyState"><h3>Немає шпаргалок</h3></div>
      </div>
    </main>
		<footer data-fls-footer="" class="footer">
			<div class="footer__container">
				<div class="footer__inner">
					<div class="footer__text">
						<p>© 2025 WEP-3.0.</p>
					</div>
				</div>
			</div>
		</footer>
  </div>
  <div class="modal" id="cheatsheetModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Додати шпаргалку</h2>
        <button class="modal-close" id="closeModal">×</button>
      </div>
      <div class="modal-body">
        <form id="cheatsheetForm">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label>Назва *</label>
            <input type="text" id="title" required placeholder="Наприклад: Flexbox Center">
          </div>
          <div class="form-group">
            <label>Опис</label>
            <input type="text" id="description" placeholder="Короткий опис">
          </div>
          <div class="form-group">
            <div class="code-actions">
              <label>Код HTML</label>
              <button type="button" class="btn btn--copy" onclick="copyCode('htmlCode')">📋 Копіювати</button>
            </div>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px;">
              <input type="checkbox" id="htmlToggle" style="width:auto;">
              <span>Додати HTML</span>
            </label>
            <textarea id="htmlCode" placeholder="Вставте HTML код тут..." disabled style="min-height:500px;max-height:500px;overflow-y:auto;"></textarea>
          </div>
          <div class="form-group">
            <div class="code-actions">
              <label>Код CSS</label>
              <button type="button" class="btn btn--copy" onclick="copyCode('cssCode')">📋 Копіювати</button>
            </div>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px;">
              <input type="checkbox" id="cssToggle" style="width:auto;">
              <span>Додати CSS</span>
            </label>
            <textarea id="cssCode" placeholder="Вставте CSS код тут..." disabled style="min-height:500px;max-height:500px;overflow-y:auto;"></textarea>
          </div>
          <div class="form-group">
            <div class="code-actions">
              <label>Код JavaScript</label>
              <button type="button" class="btn btn--copy" onclick="copyCode('jsCode')">📋 Копіювати</button>
            </div>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px;">
              <input type="checkbox" id="jsToggle" style="width:auto;">
              <span>Додати JavaScript</span>
            </label>
            <textarea id="jsCode" placeholder="Вставте JavaScript код тут..." disabled style="min-height:500px;max-height:500px;overflow-y:auto;"></textarea>
          </div>
          <button type="button" class="btn btn--preview" id="previewBtn">👁 Перегляд</button>
          <div class="preview-container" id="previewContainer">
            <iframe id="previewFrame"></iframe>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn--secondary" id="cancelBtn">Скасувати</button>
            <button type="submit" class="btn btn--primary">Зберегти</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="cheatsheet.js?v=13"></script>
</body>
</html>
